<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stingr — All Tools</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body {
      width: 100%;
      height: auto;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px;
      overflow-y: auto;
    }

    .settings-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .settings-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .tool-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 20px;
    }

    .cat-header {
      margin-top: 16px;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .cat-header:first-child {
      margin-top: 0;
    }

    .cat-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .cat-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    .tool-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .tool-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool-icon {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
    }

    .tool-name {
      font-size: 13px;
      font-weight: 600;
    }

    .tool-desc {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .stats {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .settings-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .settings-section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
    }

    .settings-row-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .settings-row-label {
      font-size: 13px;
      font-weight: 600;
    }

    .settings-row-desc {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .settings-row-value {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-reset {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-reset:hover {
      background: rgba(248, 113, 113, 0.1);
      border-color: var(--error);
      color: var(--error);
    }

    .btn-reset.done {
      border-color: var(--success);
      color: var(--success);
      background: rgba(74, 222, 128, 0.08);
    }
  </style>
</head>
<body>
  <div class="header-left" style="margin-bottom: 16px">
    <img src="icons/icon-48.png" alt="Stingr" class="header-logo">
    <span class="header-title" style="font-size: 18px; margin-left: 8px">Stingr<span style="color: var(--text-muted); font-weight: 400">.dev</span></span>
  </div>

  <div class="settings-title">All Tools</div>
  <div class="settings-desc">20 developer tools organized in 4 categories. All tools are always available — just switch tabs in the popup.</div>

  <div class="tool-grid" id="tool-grid"></div>

  <!-- Settings Section -->
  <div class="settings-section">
    <div class="settings-section-title">Settings</div>
    <div class="settings-row">
      <div class="settings-row-info">
        <div class="settings-row-label">Popup Width</div>
        <div class="settings-row-desc">Reset to default 420px</div>
        <div class="settings-row-value" id="current-size">Loading...</div>
      </div>
      <button class="btn-reset" id="btn-reset-size">Reset</button>
    </div>
  </div>

  <div class="stats">100% private — all processing happens in your browser</div>

  <script src="settings.js"></script>
</body>
</html>
