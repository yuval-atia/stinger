<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Stingr</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">

      <button class="header-btn" id="btn-open-site" title="Open stingr.dev"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar-wrap">
    <div class="tab-bar" id="tab-bar"></div>
  </div>

  <!-- Tool Content -->
  <div class="tool-content" id="tool-content"></div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">50+ more tools</span>
    <a href="https://stingr.dev" target="_blank" rel="noopener" class="footer-link">stingr.dev &rarr;</a>
  </div>

  <!-- Scripts: utils then popup logic -->
  <script src="utils/formatters.js"></script>
  <script src="utils/generators.js"></script>
  <script src="utils/base64.js"></script>
  <script src="utils/url-encode.js"></script>
  <script src="utils/jwt.js"></script>
  <script src="utils/hash.js"></script>
  <script src="utils/timestamp.js"></script>
  <script src="utils/jsonpath.js"></script>
  <script src="utils/colorConverter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
